<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mario Tarzı Elmas Oyunu</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #111;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000;
        }

        .hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #fff;
            font: 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto;
            background: rgba(0,0,0,0.25);
            padding: 10px 12px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
        }

        .hint {
            opacity: .85;
            margin-top: 6px;
            font-size: 12px;
            max-width: 360px;
        }

        .btn {
            margin-top: 8px;
            padding: 7px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(255,255,255,.08);
            color: #fff;
            cursor: pointer;
        }

            .btn:active {
                transform: translateY(1px);
            }
    </style>
</head>
<body>
    <div class="hud">
        Bölüm: <span id="level">1</span> |
        Skor: <span id="score">0</span> |
        Can: <span id="lives">3</span>
        <div class="hint">Kontrol: ← → , Space (Zıpla). Elmasları topla. Kuşa/engellere çarpma.</div>
        <button class="btn" id="musicBtn">🎵 Müziği Başlat</button>
    </div>

    <canvas id="game" width="960" height="540"></canvas>

    <script>
        (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const hudLevel = document.getElementById("level");
        const hudScore = document.getElementById("score");
        const hudLives = document.getElementById("lives");
        const musicBtn = document.getElementById("musicBtn");

        // ---------- Helpers ----------
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const aabb = (A, B) =>
        A.x < B.x + B.w && A.x + A.w > B.x &&
        A.y < B.y + B.h && A.y + A.h > B.y;

        // ---------- Audio (no file needed) ----------
        // Basit 8-bit loop. Tarayıcılar kullanıcı etkileşimi ister -> butonla başlatıyoruz.
        let audioCtx = null;
        let musicOn = false;
        let musicTimer = null;

        function startMusic() {
        if (musicOn) return;
        musicOn = true;

        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();

        const master = audioCtx.createGain();
        master.gain.value = 0.06; // ses düşük
        master.connect(audioCtx.destination);

        const notes = [
        523.25, 659.25, 783.99, 659.25,
        523.25, 392.00, 523.25, 659.25
        ]; // C5 E5 G5 E5 C5 G4 C5 E5
        let i = 0;

        const playNote = (freq, durMs) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "square";
        o.frequency.value = freq;

        g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(1.0, audioCtx.currentTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (durMs/1000));

        o.connect(g);
        g.connect(master);

        o.start();
        o.stop(audioCtx.currentTime + (durMs/1000) + 0.02);
        };

        musicTimer = setInterval(() => {
        if (!musicOn) return;
        playNote(notes[i % notes.length], 140);
        i++;
        }, 160);

        musicBtn.textContent = "🎵 Müziği Durdur";
        }

        function stopMusic() {
        musicOn = false;
        if (musicTimer) clearInterval(musicTimer);
        musicTimer = null;
        musicBtn.textContent = "🎵 Müziği Başlat";
        }

        musicBtn.addEventListener("click", async () => {
        try {
        if (!musicOn) {
        startMusic();
        if (audioCtx && audioCtx.state === "suspended") await audioCtx.resume();
        } else {
        stopMusic();
        }
        } catch (e) {
        alert("Müzik başlatılamadı. Tarayıcı izinlerine bak.");
        }
        });

        // ---------- Input ----------
        const keys = { left:false, right:false, jump:false };
        addEventListener("keydown", (e) => {
        if (e.code === "ArrowLeft") keys.left = true;
        if (e.code === "ArrowRight") keys.right = true;
        if (e.code === "Space") keys.jump = true;
        });
        addEventListener("keyup", (e) => {
        if (e.code === "ArrowLeft") keys.left = false;
        if (e.code === "ArrowRight") keys.right = false;
        if (e.code === "Space") keys.jump = false;
        });

        // ---------- Game State ----------
        const state = {
        score: 0,
        lives: 3,
        gravity: 1650,
        friction: 0.86,
        time: 0,
        cameraX: 0,
        levelIndex: 0,
        worldWidth: 2200,
        completed: false
        };

        // ---------- Levels ----------
        // Her level kendi platform/elmas/engel setine sahip.
        const LEVELS = [
        {
        name: "Bölüm 1",
        worldWidth: 2200,
        floorY: 480,
        platforms: [
        { x: 0,   y: 480, w: 2200, h: 80 },
        { x: 240, y: 380, w: 160, h: 18 },
        { x: 460, y: 320, w: 170, h: 18 },
        { x: 700, y: 260, w: 170, h: 18 },
        { x: 940, y: 340, w: 150, h: 18 },
        { x: 1140,y: 300, w: 190, h: 18 },
        { x: 1400,y: 240, w: 180, h: 18 },
        { x: 1680,y: 320, w: 180, h: 18 },
        { x: 1920,y: 280, w: 180, h: 18 },
        ],
        diamonds: [
        { x: 300, y: 340, w: 18, h: 18, taken:false },
        { x: 520, y: 280, w: 18, h: 18, taken:false },
        { x: 760, y: 220, w: 18, h: 18, taken:false },
        { x: 980, y: 300, w: 18, h: 18, taken:false },
        { x: 1210,y: 260, w: 18, h: 18, taken:false },
        { x: 1460,y: 200, w: 18, h: 18, taken:false },
        { x: 1720,y: 280, w: 18, h: 18, taken:false },
        { x: 1960,y: 240, w: 18, h: 18, taken:false },
        ],
        hazards: [
        // yer engelleri (kırmızı blok)
        { type:"spike", x: 560, y: 460, w: 28, h: 20 },
        { type:"spike", x: 1040,y: 460, w: 28, h: 20 },
        { type:"spike", x: 1520,y: 460, w: 28, h: 20 },
        ],
        birds: [
        // kuşlar: sinüsle yukarı-aşağı + yatay dolaşır
        { x: 820, baseY: 180, amp: 22, w: 38, h: 22, speed: 120, dir: 1 },
        ]
        },
        {
        name: "Bölüm 2",
        worldWidth: 2600,
        floorY: 480,
        platforms: [
        { x: 0,   y: 480, w: 2600, h: 80 },
        { x: 280, y: 390, w: 170, h: 18 },
        { x: 520, y: 330, w: 170, h: 18 },
        { x: 760, y: 270, w: 170, h: 18 },
        { x: 1010,y: 310, w: 170, h: 18 },
        { x: 1250,y: 250, w: 170, h: 18 },
        { x: 1500,y: 340, w: 170, h: 18 },
        { x: 1750,y: 280, w: 170, h: 18 },
        { x: 2000,y: 220, w: 170, h: 18 },
        { x: 2260,y: 320, w: 210, h: 18 },
        ],
        diamonds: [
        { x: 330, y: 350, w: 18, h: 18, taken:false },
        { x: 570, y: 290, w: 18, h: 18, taken:false },
        { x: 810, y: 230, w: 18, h: 18, taken:false },
        { x: 1060,y: 270, w: 18, h: 18, taken:false },
        { x: 1300,y: 210, w: 18, h: 18, taken:false },
        { x: 1550,y: 300, w: 18, h: 18, taken:false },
        { x: 1800,y: 240, w: 18, h: 18, taken:false },
        { x: 2050,y: 180, w: 18, h: 18, taken:false },
        { x: 2350,y: 280, w: 18, h: 18, taken:false },
        ],
        hazards: [
        { type:"spike", x: 620, y: 460, w: 28, h: 20 },
        { type:"spike", x: 1360,y: 460, w: 28, h: 20 },
        { type:"spike", x: 1960,y: 460, w: 28, h: 20 },
        // yeni: ateş (yanma efekti gibi)
        { type:"fire",  x: 1660,y: 458, w: 34, h: 22 },
        ],
        birds: [
        { x: 980, baseY: 170, amp: 26, w: 38, h: 22, speed: 160, dir: -1 },
        { x: 1880,baseY: 160, amp: 18, w: 38, h: 22, speed: 140, dir: 1 },
        ]
        }
        ];

        // ---------- World runtime containers ----------
        const world = {
        floorY: 480,
        platforms: [],
        diamonds: [],
        hazards: [],
        birds: [],
        loadLevel(idx) {
        const L = LEVELS[idx];
        state.levelIndex = idx;
        state.worldWidth = L.worldWidth;
        this.floorY = L.floorY;
        this.platforms = L.platforms.map(p => ({...p}));
        this.diamonds  = L.diamonds.map(d => ({...d, taken:false}));
        this.hazards   = L.hazards.map(h => ({...h}));
        this.birds     = L.birds.map(b => ({...b}));
        hudLevel.textContent = String(idx + 1);
        state.cameraX = 0;
        player.reset();
        updateHud();
        }
        };

        // ---------- Player ----------
        const player = {
        x: 80, y: 200, w: 34, h: 48,
        vx: 0, vy: 0,
        speed: 540,
        jumpV: -760,
        onGround: false,
        hurtCooldown: 0,
        burning: 0, // çarpınca kısa süre "yanma" efekti
        reset() {
        this.x = 80; this.y = 200;
        this.vx = 0; this.vy = 0;
        this.onGround = false;
        this.hurtCooldown = 0;
        this.burning = 0;
        }
        };

        function updateHud() {
        hudScore.textContent = String(state.score);
        hudLives.textContent = String(state.lives);
        hudLevel.textContent = String(state.levelIndex + 1);
        }

        function takeDamage(kind="hit") {
        if (player.hurtCooldown > 0) return;
        state.lives -= 1;
        player.hurtCooldown = 1.1;
        if (kind === "burn") player.burning = 0.8;
        updateHud();

        if (state.lives <= 0) {
        alert("Oyun bitti! Skor: " + state.score);
        restartGame();
        } else {
        // hasar alınca başa at
        player.reset();
        state.cameraX = 0;
        }
        }

        function restartGame() {
        state.score = 0;
        state.lives = 3;
        state.completed = false;
        world.loadLevel(0);
        }

        function nextLevel() {
        const next = state.levelIndex + 1;
        if (next < LEVELS.length) {
        alert("Bölüm " + (state.levelIndex + 1) + " tamam! Bölüm " + (next + 1) + " açıldı.");
        world.loadLevel(next);
        } else {
        alert("Tebrikler! Tüm bölümler bitti. Toplam skor: " + state.score);
        restartGame();
        }
        }

        // ---------- Physics + collisions ----------
        function moveAndCollide(dt) {
        if (keys.left) player.vx = -player.speed;
        else if (keys.right) player.vx = player.speed;
        else player.vx *= state.friction;

        if (keys.jump && player.onGround) {
        player.vy = player.jumpV;
        player.onGround = false;
        }

        player.vy += state.gravity * dt;

        // move
        player.x += player.vx * dt;
        player.y += player.vy * dt;

        // collide with platforms
        player.onGround = false;

        for (const p of world.platforms) {
        if (!aabb(player, p)) continue;

        const prevY = player.y - player.vy * dt;
        if (prevY + player.h <= p.y + 2 && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        } else {
        const prevX = player.x - player.vx * dt;
        if (prevX + player.w <= p.x + 2) player.x = p.x - player.w;
        else if (prevX >= p.x + p.w - 2) player.x = p.x + p.w;
        if (prevY >= p.y + p.h - 2 && player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
        }
        }
        }

        player.x = clamp(player.x, 0, state.worldWidth - player.w);

        if (player.y > canvas.height + 220) {
        takeDamage();
        }
        }

        function updateCamera() {
        const target = player.x - canvas.width * 0.45;
        state.cameraX = clamp(target, 0, state.worldWidth - canvas.width);
        }

        function updateBirds(dt) {
        for (const b of world.birds) {
        b.x += b.speed * b.dir * dt;
        // dolaşım: ekran/dünya içinde gidip gelsin
        if (b.x < 300) { b.x = 300; b.dir = 1; }
        if (b.x > state.worldWidth - 300) { b.x = state.worldWidth - 300; b.dir = -1; }
        b.y = b.baseY + Math.sin(state.time * 3.2) * b.amp;

        const birdBox = { x: b.x, y: b.y, w: b.w, h: b.h };
        if (aabb(player, birdBox)) {
        takeDamage("burn"); // kuşa değerse "yanma" gibi davranalım
        }
        }
        }

        function update(dt) {
        state.time += dt;
        if (player.hurtCooldown > 0) player.hurtCooldown -= dt;
        if (player.burning > 0) player.burning -= dt;

        moveAndCollide(dt);
        updateCamera();
        updateBirds(dt);

        // diamonds
        for (const d of world.diamonds) {
        if (d.taken) continue;
        if (aabb(player, d)) {
        d.taken = true;
        state.score += 10;
        updateHud();
        }
        }

        // hazards
        for (const h of world.hazards) {
        if (aabb(player, h)) {
        if (h.type === "fire") takeDamage("burn");
        else takeDamage("hit");
        }
        }

        // level complete
        if (world.diamonds.every(d => d.taken)) {
        nextLevel();
        }
        }

        // ---------- Rendering ----------
        function drawBackground() {
        // sky gradient
        const g = ctx.createLinearGradient(0,0,0,canvas.height);
        g.addColorStop(0, "#2a6bff");
        g.addColorStop(0.55, "#66d0ff");
        g.addColorStop(1, "#bdf3ff");
        ctx.fillStyle = g;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // clouds (parallax)
        const cx = state.cameraX * 0.25;
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        for (let i=0;i<8;i++){
        const x = (i*220 - (cx % 220)) + 80;
        const y = 70 + (i%3)*35;
        ctx.beginPath();
        ctx.ellipse(x, y, 42, 18, 0, 0, Math.PI*2);
        ctx.ellipse(x+35, y+6, 32, 14, 0, 0, Math.PI*2);
        ctx.ellipse(x-35, y+8, 30, 13, 0, 0, Math.PI*2);
        ctx.fill();
        }
        }

        function drawWorld() {
        ctx.save();
        ctx.translate(-state.cameraX, 0);

        // platforms
        for (const p of world.platforms) {
        const isFloor = (p.y >= world.floorY);
        ctx.fillStyle = isFloor ? "#1e7a3a" : "#2c9b4f";
        ctx.fillRect(p.x, p.y, p.w, p.h);

        // top highlight like grass
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(p.x, p.y, p.w, 3);
        }

        // diamonds
        for (const d of world.diamonds) {
        if (d.taken) continue;
        ctx.fillStyle = "#00e0ff";
        ctx.beginPath();
        ctx.moveTo(d.x + d.w/2, d.y);
        ctx.lineTo(d.x + d.w, d.y + d.h/2);
        ctx.lineTo(d.x + d.w/2, d.y + d.h);
        ctx.lineTo(d.x, d.y + d.h/2);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.stroke();
        }

        // hazards
        for (const h of world.hazards) {
        if (h.type === "fire") {
        // anim fire
        const t = state.time;
        const flick = 1 + Math.sin(t*12)*0.12;
        ctx.fillStyle = "#ff6a00";
        ctx.fillRect(h.x, h.y, h.w, h.h);
        ctx.fillStyle = "#ffd000";
        ctx.fillRect(h.x+6, h.y+6, (h.w-12)*flick, h.h-12);
        } else {
        // spike
        ctx.fillStyle = "#ff3b3b";
        ctx.fillRect(h.x, h.y, h.w, h.h);
        }
        }

        // birds
        for (const b of world.birds) {
        // kuş: basit çizim
        ctx.fillStyle = "#222";
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = "#fff";
        ctx.fillRect(b.x + 6, b.y + 6, 6, 6); // göz
        ctx.fillStyle = "#ffb000";
        ctx.fillRect(b.x + b.w - 8, b.y + 10, 8, 4); // gaga
        }

        // player: “Mario-ish” (red hat + blue overalls)
        drawPlayer();

        ctx.restore();
        }

        function drawPlayer() {
        // blink when hurt
        const visible = (player.hurtCooldown > 0)
        ? (Math.floor(state.time*18)%2===0)
        : true;
        if (!visible) return;

        const x = player.x, y = player.y;

        // burn aura if burning
        if (player.burning > 0) {
        ctx.fillStyle = "rgba(255,120,0,0.25)";
        ctx.beginPath();
        ctx.ellipse(x + player.w/2, y + player.h/2, 30, 34, 0, 0, Math.PI*2);
        ctx.fill();
        }

        // body base (skin)
        ctx.fillStyle = "#f2c7a5";
        ctx.fillRect(x+10, y+14, 14, 14); // face

        // hat
        ctx.fillStyle = "#e0362a";
        ctx.fillRect(x+6, y+6, 22, 10);
        ctx.fillRect(x+4, y+14, 26, 6); // brim

        // shirt (red)
        ctx.fillStyle = "#e0362a";
        ctx.fillRect(x+6, y+24, 22, 10);

        // overalls (blue)
        ctx.fillStyle = "#1d5dff";
        ctx.fillRect(x+8, y+30, 18, 16);

        // buttons
        ctx.fillStyle = "#ffd000";
        ctx.fillRect(x+10, y+34, 3, 3);
        ctx.fillRect(x+21, y+34, 3, 3);

        // legs
        ctx.fillStyle = "#1d5dff";
        ctx.fillRect(x+8, y+46, 8, 2);
        ctx.fillRect(x+18, y+46, 8, 2);

        // shoes
        ctx.fillStyle = "#3b2a1f";
        ctx.fillRect(x+6, y+48, 10, 6);
        ctx.fillRect(x+18, y+48, 12, 6);

        // mustache + eye
        ctx.fillStyle = "#3b2a1f";
        ctx.fillRect(x+11, y+21, 12, 3); // mustache
        ctx.fillStyle = "#111";
        ctx.fillRect(x+14, y+18, 2, 2); // eye
        }

        function draw() {
        drawBackground();
        drawWorld();

        // bottom info
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(0, canvas.height-28, canvas.width, 28);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = "12px system-ui";
        ctx.fillText(`Dünya: ${state.worldWidth}px  |  Bölüm: ${state.levelIndex+1}/${LEVELS.length}`, 12, canvas.height-10);
        }

        // ---------- Loop ----------
        let last = performance.now();
        function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
        }

        // start
        world.loadLevel(0);
        updateHud();
        requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
