<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Murat Diamond Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #111;
            height: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #000;
            touch-action: none;
        }

        .hud {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 20;
            color: #fff;
            font: 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto;
            background: rgba(0,0,0,0.28);
            padding: 10px 12px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.12);
            user-select: none;
        }

        .hint {
            opacity: .85;
            margin-top: 6px;
            font-size: 12px;
            max-width: 360px;
        }

        .btn {
            margin-top: 8px;
            padding: 7px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(255,255,255,.08);
            color: #fff;
            cursor: pointer;
        }

            .btn:active {
                transform: translateY(1px);
            }

        #touch {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 150px;
            display: none;
            z-index: 30;
        }

        #padL, #padR {
            position: absolute;
            bottom: 0;
            height: 150px;
            width: 50%;
        }

        #padL {
            left: 0;
        }

        #padR {
            right: 0;
        }

        #jumpBtn {
            position: absolute;
            right: 18px;
            bottom: 18px;
            width: 92px;
            height: 92px;
            border-radius: 26px;
            border: 1px solid rgba(255,255,255,.25);
            background: rgba(0,0,0,.35);
            color: #fff;
            font: 700 14px system-ui;
            backdrop-filter: blur(6px);
        }

            #jumpBtn:active {
                transform: translateY(1px);
            }
    </style>
</head>
<body>
    <div class="hud">
        Bölüm: <span id="level">1</span> |
        Skor: <span id="score">0</span> |
        Can: <span id="lives">3</span>
        <div class="hint">Kontrol: ← → , Space. Mobilde: ekranın sol/sağ yarısına basılı tut, “Zıpla”. Lav yükseliyor: oyalanma!</div>
        <button class="btn" id="musicBtn">🎵 Müziği Başlat</button>
    </div>

    <!-- Mobil kontrol -->
    <div id="touch">
        <div id="padL"></div>
        <div id="padR"></div>
        <button id="jumpBtn">Zıpla</button>
    </div>

    <canvas id="game" width="960" height="540"></canvas>

    <script>
        (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const hudLevel = document.getElementById("level");
        const hudScore = document.getElementById("score");
        const hudLives = document.getElementById("lives");
        const musicBtn = document.getElementById("musicBtn");

        // ---------- Helpers ----------
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const aabb = (A, B) =>
        A.x < B.x + B.w && A.x + A.w > B.x &&
        A.y < B.y + B.h && A.y + A.h > B.y;

        // ---------- Input ----------
        const keys = { left:false, right:false, jump:false };

        addEventListener("keydown", (e) => {
        if (e.code === "ArrowLeft") keys.left = true;
        if (e.code === "ArrowRight") keys.right = true;
        if (e.code === "Space") keys.jump = true;
        });
        addEventListener("keyup", (e) => {
        if (e.code === "ArrowLeft") keys.left = false;
        if (e.code === "ArrowRight") keys.right = false;
        if (e.code === "Space") keys.jump = false;
        });

        // --- Mobil dokunmatik kontrol ---
        const touchUI = document.getElementById("touch");
        const padL = document.getElementById("padL");
        const padR = document.getElementById("padR");
        const jumpBtn = document.getElementById("jumpBtn");

        function enableTouchUIIfNeeded() {
        const isTouch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
        if (isTouch) touchUI.style.display = "block";
        }
        enableTouchUIIfNeeded();

        const bindPad = (el, dir) => {
        const down = (e) => {
        e.preventDefault();
        if (dir === "L") { keys.left = true; keys.right = false; }
        if (dir === "R") { keys.right = true; keys.left = false; }
        };
        const up = (e) => {
        e.preventDefault();
        if (dir === "L") keys.left = false;
        if (dir === "R") keys.right = false;
        };
        el.addEventListener("touchstart", down, { passive:false });
        el.addEventListener("touchend", up, { passive:false });
        el.addEventListener("touchcancel", up, { passive:false });
        };
        bindPad(padL, "L");
        bindPad(padR, "R");

        jumpBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.jump = true; }, { passive:false });
        jumpBtn.addEventListener("touchend",   (e) => { e.preventDefault(); keys.jump = false; }, { passive:false });

        // ---------- Audio (no file) ----------
        let audioCtx = null;
        let musicOn = false;
        let musicTimer = null;

        function startMusic() {
        if (musicOn) return;
        musicOn = true;
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();

        const master = audioCtx.createGain();
        master.gain.value = 0.06;
        master.connect(audioCtx.destination);

        const notes = [523.25, 659.25, 783.99, 659.25, 523.25, 392.00, 523.25, 659.25];
        let i = 0;

        const playNote = (freq, durMs) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "square";
        o.frequency.value = freq;

        g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(1.0, audioCtx.currentTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (durMs/1000));

        o.connect(g); g.connect(master);
        o.start();
        o.stop(audioCtx.currentTime + (durMs/1000) + 0.02);
        };

        musicTimer = setInterval(() => {
        if (!musicOn) return;
        playNote(notes[i % notes.length], 140);
        i++;
        }, 160);

        musicBtn.textContent = "🎵 Müziği Durdur";
        }

        function stopMusic() {
        musicOn = false;
        if (musicTimer) clearInterval(musicTimer);
        musicTimer = null;
        musicBtn.textContent = "🎵 Müziği Başlat";
        }

        musicBtn.addEventListener("click", async () => {
        try {
        if (!musicOn) {
        startMusic();
        if (audioCtx && audioCtx.state === "suspended") await audioCtx.resume();
        } else stopMusic();
        } catch {
        alert("Müzik başlatılamadı.");
        }
        });

        // ---------- Game State ----------
        const state = {
        score: 0,
        lives: 3,
        gravity: 1650,
        friction: 0.86,
        time: 0,
        cameraX: 0,
        levelIndex: 0,
        worldWidth: 2400,
        // alttan gelen canavar/lava
        chaserY: 9999,
        chaserSpeed: 18, // level ile artacak
        // küçük dokunulmazlık
        hurtCooldown: 0,
        };

        const player = {
        x: 80, y: 200, w: 34, h: 48,
        vx: 0, vy: 0,
        speed: 560,
        jumpV: -780,
        onGround: false,
        burning: 0,
        reset() {
        this.x = 80; this.y = 200;
        this.vx = 0; this.vy = 0;
        this.onGround = false;
        this.burning = 0;
        state.cameraX = 0;
        }
        };

        const world = {
        floorY: 480,
        platforms: [],
        diamonds: [],
        hazards: [],
        birds: [],
        };

        function updateHud() {
        hudLevel.textContent = String(state.levelIndex + 1);
        hudScore.textContent = String(state.score);
        hudLives.textContent = String(state.lives);
        }

        function takeDamage(kind="hit") {
        if (state.hurtCooldown > 0) return;
        state.lives -= 1;
        state.hurtCooldown = 1.0;
        if (kind === "burn") player.burning = 0.8;
        updateHud();

        if (state.lives <= 0) {
        alert("Oyun bitti! Skor: " + state.score);
        restartGame();
        return;
        }

        // hasar alınca başa dön
        player.reset();
        // lava'yı da biraz geriye at ki “ezici” olmasın
        state.chaserY = world.floorY + 260;
        }

        function restartGame() {
        state.score = 0;
        state.lives = 3;
        loadLevel(0);
        }

        function nextLevel() {
        const next = state.levelIndex + 1;
        if (next < 5) {
        alert(`Bölüm ${state.levelIndex + 1} tamam! Bölüm ${next + 1} açıldı.`);
        loadLevel(next);
        } else {
        alert(`Tebrikler! 5 bölümü de bitirdin. Skor: ${state.score}`);
        restartGame();
        }
        }

        // ---------- Level generator (5 bölüm) ----------
        function makePlatforms(levelIdx) {
        const baseWidth = 2200 + levelIdx * 200;
        const floorY = 480;
        const plats = [{ x: 0, y: floorY, w: baseWidth, h: 80 }];

        // zorluk arttıkça platformlar biraz daha “seyrek” ve “yüksek”
        const step = 240 - levelIdx * 10;
        let x = 240;

        for (let i=0; i<8 + levelIdx; i++) {
        const w = 150 + (i%3)*30;
        const y = 390 - (i%4)*55 - levelIdx*6; // zamanla biraz daha yükselir
        plats.push({ x, y, w, h: 18 });
        x += step + (i%2)*40;
        }

        // son platform
        plats.push({ x: baseWidth - 240, y: 300 - levelIdx*8, w: 190, h: 18 });

        return { plats, baseWidth, floorY };
        }

        function placeDiamonds(platforms, floorY, worldWidth, levelIdx) {
        const diamonds = [];

        // platformların üstüne
        for (const p of platforms) {
        if (p.y >= floorY) continue;
        diamonds.push({ x: p.x + p.w/2 - 9, y: p.y - 28, w: 18, h: 18, taken:false });
        if ((p.x|0) % 2 === 0) diamonds.push({ x: p.x + 20, y: p.y - 28, w: 18, h: 18, taken:false });
        }

        // yere de koy (senin isteğin)
        const groundCount = 6 + levelIdx;
        for (let i=0;i<groundCount;i++){
        const gx = 140 + i * ( (worldWidth - 280) / groundCount );
        diamonds.push({ x: gx, y: floorY - 30, w: 18, h: 18, taken:false });
        }

        // biraz riskli elmas (lava yaklaştığında zor)
        diamonds.push({ x: worldWidth*0.55, y: floorY - 30, w: 18, h: 18, taken:false });
        diamonds.push({ x: worldWidth*0.75, y: floorY - 30, w: 18, h: 18, taken:false });

        return diamonds;
        }

        function makeHazards(worldWidth, floorY, levelIdx) {
        const hazards = [];
        // spikes
        const spikeCount = 3 + levelIdx;
        for (let i=0;i<spikeCount;i++){
        const x = 520 + i * ( (worldWidth - 900) / Math.max(1, spikeCount-1) );
        hazards.push({ type:"spike", x, y: floorY-20, w: 28, h: 20 });
        }
        // fire (level 2+)
        if (levelIdx >= 1) {
        hazards.push({ type:"fire", x: worldWidth*0.68, y: floorY-22, w: 34, h: 22 });
        }
        return hazards;
        }

        function makeBirds(worldWidth, levelIdx) {
        const birds = [];
        const birdCount = 1 + Math.floor(levelIdx/1); // 1..5 arası artar
        for (let i=0;i<birdCount;i++){
        birds.push({
        x: 700 + i * (worldWidth / (birdCount+1)),
        baseY: 170 + (i%2)*25,
        amp: 18 + (i%3)*8,
        w: 38, h: 22,
        speed: 120 + levelIdx*18,
        dir: (i%2===0) ? 1 : -1
        });
        }
        return birds;
        }

        function loadLevel(levelIdx) {
        state.levelIndex = levelIdx;

        const { plats, baseWidth, floorY } = makePlatforms(levelIdx);
        state.worldWidth = baseWidth;
        world.floorY = floorY;
        world.platforms = plats;

        world.diamonds = placeDiamonds(world.platforms, world.floorY, state.worldWidth, levelIdx);
        world.hazards = makeHazards(state.worldWidth, world.floorY, levelIdx);
        world.birds = makeBirds(state.worldWidth, levelIdx);

        // alttan gelen canavar ayarları
        state.chaserY = world.floorY + 260; // başlangıçta aşağıda
        state.chaserSpeed = 16 + levelIdx * 6; // 16,22,28,34,40

        // player reset
        player.reset();
        updateHud();
        }

        // ---------- Physics ----------
        function moveAndCollide(dt) {
        if (keys.left) player.vx = -player.speed;
        else if (keys.right) player.vx = player.speed;
        else player.vx *= state.friction;

        if (keys.jump && player.onGround) {
        player.vy = player.jumpV;
        player.onGround = false;
        }

        player.vy += state.gravity * dt;

        player.x += player.vx * dt;
        player.y += player.vy * dt;

        player.onGround = false;

        for (const p of world.platforms) {
        if (!aabb(player, p)) continue;

        const prevY = player.y - player.vy * dt;
        if (prevY + player.h <= p.y + 2 && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        } else {
        const prevX = player.x - player.vx * dt;
        if (prevX + player.w <= p.x + 2) player.x = p.x - player.w;
        else if (prevX >= p.x + p.w - 2) player.x = p.x + p.w;

        if (prevY >= p.y + p.h - 2 && player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
        }
        }
        }

        player.x = clamp(player.x, 0, state.worldWidth - player.w);

        // düşme
        if (player.y > canvas.height + 260) takeDamage("hit");
        }

        function updateCamera() {
        const target = player.x - canvas.width * 0.45;
        state.cameraX = clamp(target, 0, state.worldWidth - canvas.width);
        }

        function updateBirds(dt) {
        for (const b of world.birds) {
        b.x += b.speed * b.dir * dt;

        if (b.x < 320) { b.x = 320; b.dir = 1; }
        if (b.x > state.worldWidth - 320) { b.x = state.worldWidth - 320; b.dir = -1; }

        b.y = b.baseY + Math.sin(state.time * 3.2) * b.amp;

        const box = { x: b.x, y: b.y, w: b.w, h: b.h };
        if (aabb(player, box)) takeDamage("burn");
        }
        }

        function updateChaser(dt) {
        // y ekseninde yukarı çık: chaserY azalır
        state.chaserY -= state.chaserSpeed * dt;

        // ekran dışına çok çıkmasın
        state.chaserY = clamp(state.chaserY, world.floorY - 40, world.floorY + 260);

        // oyuncuya değdi mi?
        if (player.y + player.h >= state.chaserY) {
        takeDamage("burn");
        }
        }

        function update(dt) {
        state.time += dt;
        if (state.hurtCooldown > 0) state.hurtCooldown -= dt;
        if (player.burning > 0) player.burning -= dt;

        moveAndCollide(dt);
        updateCamera();
        updateBirds(dt);
        updateChaser(dt);

        // elmas
        for (const d of world.diamonds) {
        if (d.taken) continue;
        if (aabb(player, d)) {
        d.taken = true;
        state.score += 10;
        updateHud();
        }
        }

        // hazards
        for (const h of world.hazards) {
        if (aabb(player, h)) {
        if (h.type === "fire") takeDamage("burn");
        else takeDamage("hit");
        }
        }

        // bölüm bitti mi?
        if (world.diamonds.every(d => d.taken)) nextLevel();
        }

        // ---------- Rendering ----------
        function drawBackground() {
        // sky gradient
        const g = ctx.createLinearGradient(0,0,0,canvas.height);
        g.addColorStop(0, "#2a6bff");
        g.addColorStop(0.55, "#66d0ff");
        g.addColorStop(1, "#bdf3ff");
        ctx.fillStyle = g;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // clouds (parallax)
        const cx = state.cameraX * 0.25;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        for (let i=0;i<9;i++){
        const x = (i*220 - (cx % 220)) + 60;
        const y = 70 + (i%3)*36;
        ctx.beginPath();
        ctx.ellipse(x, y, 42, 18, 0, 0, Math.PI*2);
        ctx.ellipse(x+35, y+6, 32, 14, 0, 0, Math.PI*2);
        ctx.ellipse(x-35, y+8, 30, 13, 0, 0, Math.PI*2);
        ctx.fill();
        }
        }

        function drawLavaOverlay() {
        // chaser çizimi: ekranın altından yukarı doğru
        const y = state.chaserY;
        ctx.save();
        ctx.translate(-state.cameraX, 0);

        // lava ana kütle
        ctx.fillStyle = "rgba(255,70,0,0.55)";
        ctx.fillRect(0, y, state.worldWidth, canvas.height - y + 200);

        // dalga efekti
        ctx.fillStyle = "rgba(255,180,0,0.45)";
        for (let i=0;i<40;i++){
        const wx = i * (state.worldWidth / 40);
        const wy = y + Math.sin(state.time*6 + i)*6;
        ctx.fillRect(wx, wy, 18, 4);
        }

        ctx.restore();
        }

        function drawWorld() {
        ctx.save();
        ctx.translate(-state.cameraX, 0);

        // platforms
        for (const p of world.platforms) {
        const isFloor = (p.y >= world.floorY);
        ctx.fillStyle = isFloor ? "#1e7a3a" : "#2c9b4f";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(p.x, p.y, p.w, 3);
        }

        // diamonds
        for (const d of world.diamonds) {
        if (d.taken) continue;
        ctx.fillStyle = "#00e0ff";
        ctx.beginPath();
        ctx.moveTo(d.x + d.w/2, d.y);
        ctx.lineTo(d.x + d.w, d.y + d.h/2);
        ctx.lineTo(d.x + d.w/2, d.y + d.h);
        ctx.lineTo(d.x, d.y + d.h/2);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.stroke();
        }

        // hazards
        for (const h of world.hazards) {
        if (h.type === "fire") {
        const t = state.time;
        const flick = 1 + Math.sin(t*12)*0.12;
        ctx.fillStyle = "#ff6a00";
        ctx.fillRect(h.x, h.y, h.w, h.h);
        ctx.fillStyle = "#ffd000";
        ctx.fillRect(h.x+6, h.y+6, (h.w-12)*flick, h.h-12);
        } else {
        ctx.fillStyle = "#ff3b3b";
        ctx.fillRect(h.x, h.y, h.w, h.h);
        }
        }

        // birds
        for (const b of world.birds) {
        ctx.fillStyle = "#222";
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = "#fff";
        ctx.fillRect(b.x + 6, b.y + 6, 6, 6);
        ctx.fillStyle = "#ffb000";
        ctx.fillRect(b.x + b.w - 8, b.y + 10, 8, 4);
        }

        // player (mario-ish)
        drawPlayer();

        ctx.restore();
        }

        function drawPlayer() {
        const visible = (state.hurtCooldown > 0)
        ? (Math.floor(state.time*18)%2===0)
        : true;
        if (!visible) return;

        const x = player.x, y = player.y;

        if (player.burning > 0) {
        ctx.fillStyle = "rgba(255,120,0,0.25)";
        ctx.beginPath();
        ctx.ellipse(x + player.w/2, y + player.h/2, 30, 34, 0, 0, Math.PI*2);
        ctx.fill();
        }

        ctx.fillStyle = "#f2c7a5"; // face
        ctx.fillRect(x+10, y+14, 14, 14);

        ctx.fillStyle = "#e0362a"; // hat
        ctx.fillRect(x+6, y+6, 22, 10);
        ctx.fillRect(x+4, y+14, 26, 6);

        ctx.fillStyle = "#e0362a"; // shirt
        ctx.fillRect(x+6, y+24, 22, 10);

        ctx.fillStyle = "#1d5dff"; // overalls
        ctx.fillRect(x+8, y+30, 18, 16);

        ctx.fillStyle = "#ffd000"; // buttons
        ctx.fillRect(x+10, y+34, 3, 3);
        ctx.fillRect(x+21, y+34, 3, 3);

        ctx.fillStyle = "#1d5dff"; // legs
        ctx.fillRect(x+8, y+46, 8, 2);
        ctx.fillRect(x+18, y+46, 8, 2);

        ctx.fillStyle = "#3b2a1f"; // shoes
        ctx.fillRect(x+6, y+48, 10, 6);
        ctx.fillRect(x+18, y+48, 12, 6);

        ctx.fillStyle = "#3b2a1f"; // mustache + eye
        ctx.fillRect(x+11, y+21, 12, 3);
        ctx.fillStyle = "#111";
        ctx.fillRect(x+14, y+18, 2, 2);
        }

        function drawUIFooter() {
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(0, canvas.height-28, canvas.width, 28);
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = "12px system-ui";
        ctx.fillText(`Dünya: ${state.worldWidth}px | Bölüm: ${state.levelIndex+1}/5 | Lav hızı: ${state.chaserSpeed}`, 12, canvas.height-10);
        }

        function draw() {
        drawBackground();
        drawWorld();
        // lava üst katman gibi dursun (tehdit hissi)
        drawLavaOverlay();
        drawUIFooter();
        }

        // ---------- Loop ----------
        let last = performance.now();
        function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
        }

        // Start
        loadLevel(0);
        requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
